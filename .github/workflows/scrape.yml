name: Daily Salsa Scraper

on:
  schedule:
    # This runs the script automatically every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # This allows you to run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Checkout the files in your repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Set up Python on the cloud runner
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install the required libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run your python script to generate the XML file
    - name: Run scraper
      run: python scraper.py

    # 5. Save the updated salsa_feed.xml back into your repository
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add salsa_feed.xml
        git commit -m "Update RSS feed" || exit 0
        git push
